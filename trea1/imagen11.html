<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="camilo" content="width=, initial-scale=1.0">

</head>
<body>
    <h1>Registro en nuestra tienda</h1>
    <p><b>Nombre de usuario </b></p>
    <input type="text" placeholder="escribe aqui">
    <p><b>Emai:</b></p>
    <input type="text"placeholder="ingrece Email">
    <p><b>Edad:</b></p>
    <input type="text"placeholder="ingrece edad">
    <p><b>Genero</b></p>
    <form>
        <label>Género:</label><br>
        <input type="radio" name="genero" value="masculino"> Masculino<br>
        <input type="radio" name="genero" value="femenino"> Femenino<br>
    </form>
    <p><b>Recomendado por:</b></p>

        <label>Tipo de vehículo:</label><br>

        <select name="vehiculo">
            <option value="">google</option>
            <option value="carro">duck</option>
            <option value="moto">yahoo</option>
        </select>
    </form>
    <h2>Comentarios</h2>
    <input type="text" size="40">
    <p>Aceptar terminos y condiciones</p>
    <input type="checkbox">
    <br>
    <button>Registro</button>



    
</body>
